<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rightmove Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    #spinner, #tick {
      display: none;
      margin: 10px auto;
    }
    #message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <img id="spinner" src="spinner.gif" alt="Loading..." width="32" height="32">
  <img id="tick" src="icon_success.png" alt="Saved!" width="32" height="32">
  <div id="message">Collecting data...</div>

  <script src="popup.js"></script>
</body>
</html>
